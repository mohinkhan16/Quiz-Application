<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz-Api</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Quiz-Api</h1>

  <div id="quiz">
    <div id="questionNumber"></div>
    <div id="question"></div>
    <div id="choices"></div>
    <div id="nextBtn">Next</div>
  </div>

  <div id="result" class="hidden"></div>
  <div id="restartBtn" class="hidden">Restart Quiz</div>

  <div id="timer">
    Time Left: <span id="time">30</span>s
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
